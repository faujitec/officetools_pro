name: office_toolspro
description: Office productivity tools for documents, images, and PDFs.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  image_picker: ^1.1.2
  camera: ^0.11.1
  image: ^4.2.0
  archive: ^4.0.7
  share_plus: ^11.1.0
  url_launcher: ^6.2.5
  file_picker: ^8.1.0
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  intl: ^0.19.0
  syncfusion_flutter_pdf: ^29.2.11
  google_mobile_ads: ^6.0.0
  open_filex: ^4.7.0
  permission_handler: ^11.3.1
  google_mlkit_text_recognition: ^0.15.0
  google_mlkit_selfie_segmentation: ^0.10.0
  syncfusion_flutter_pdfviewer: ^29.2.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: app_logo.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: app_logo.png
  adaptive_icon_foreground_inset: 22
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - app_logo.png
